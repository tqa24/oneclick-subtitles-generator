# uv configuration for OSG's heavy Python engines.
#
# Each heavy engine (F5-TTS, Chatterbox, Parakeet) gets its OWN venv. To avoid storing torch
# (~2.5 GB) once per venv, uv populates venvs by HARDLINKING wheels from its global cache, so torch
# is downloaded/unpacked once and linked into every engine venv (near-zero extra disk).
#
# Hardlinks require the cache and the venvs to be on the SAME drive. In a normal install both are on
# C: (the repo and %LOCALAPPDATA%\uv\cache), so the default cache works and is shared with any wheels
# the user already has. If you install OSG on a different drive than %LOCALAPPDATA%, set UV_CACHE_DIR
# to a folder on that same drive to keep the de-dup (otherwise uv falls back to copying).
link-mode = "hardlink"
